<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Martins Auto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Martins Auto</h1>
        <nav>
            <a href="#">Início</a>
            <a href="#">Veículos</a>
            <a href="#">Sobre</a>
            <a href="#">Contato</a>
        </nav>
    </header>

    <section class="banner">
        <h2>Encontre o carro dos seus sonhos</h2>
        <p>Qualidade, confiança e os melhores preços</p>
    </section>

    <section class="carros">
        <h2>Veículos em destaque</h2>

        <div class="card">
            <img src="https://cdn.motor1.com/images/mgl/eJWNK/s1/honda-civic-2021.jpg" alt="Carro 1">
            <h3>Honda Civic</h3>
            <p>Ano: 2020</p>
            <p>R$ 95.000</p>
        </div>

        <div class="card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ0T6GX2Dnu86vVZ_dRwLZBDWJOTgQc1c4WSw&s" alt="Carro 2">
            <h3>Onix Plus</h3>
            <p>Ano: 2022</p>
            <p>R$ 75.000</p>
        </div>

        <div class="card">
            <img src="https://cdn.autopapo.com.br/box/uploads/2019/08/19125120/jeep-compass-2020-sport-frente-732x488.jpg" alt="Carro 3">
            <h3>Jeep Compass</h3>
            <p>Ano: 2021</p>
            <p>R$ 120.000</p>
        </div>
    </section>

    <footer>
        <p>© 2026 Martins Auto - Todos os direitos reservados</p>
    </footer>

</body>
</html>
